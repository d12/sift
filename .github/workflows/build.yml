name: Build & Sign

on:
  # Called from release-please.yml after a release is created
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

  # Run on every push to main (temporary — remove once CI is stable)
  push:
    branches:
      - main

  # Also allow manual runs for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: macos-15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Tooling ─────────────────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── Generate Xcode project ───────────────────────────────────────────────
      - name: Generate .xcodeproj
        run: xcodegen generate

      # ── Import code-signing certificate ─────────────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
        run: |
          # Use .keychain-db suffix (required on macOS 10.15+)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          # Generate an ephemeral password — no need for a secret
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign
          # Prepend our keychain to the search list, keeping login.keychain-db
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          # Grant codesign access to the private key without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Export path for subsequent steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ── Build & Archive ──────────────────────────────────────────────────────
      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild \
            -project Sift.xcodeproj \
            -scheme Sift \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Sift.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      # ── Export signed .app ───────────────────────────────────────────────────
      - name: Create ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export archive
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Sift.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Notarize ─────────────────────────────────────────────────────────────
      - name: Notarize
        env:
          NOTARIZE_APPLE_ID:      ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_TEAM_ID:       ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_APP_PASSWORD:  ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Sift.app" \
            "$RUNNER_TEMP/Sift.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Sift.zip" \
            --apple-id   "$NOTARIZE_APPLE_ID" \
            --team-id    "$NOTARIZE_TEAM_ID" \
            --password   "$NOTARIZE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/Sift.app"

      # ── Package as DMG ────────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          TAG="${{ inputs.tag }}"
          # Fall back to short SHA when triggered directly by a push
          LABEL="${TAG:-${{ github.sha }}}"
          LABEL="${LABEL:0:7}"
          hdiutil create \
            -volname "Sift" \
            -srcfolder "$RUNNER_TEMP/export/Sift.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/Sift-${LABEL}.dmg"
          echo "DMG_LABEL=${LABEL}" >> "$GITHUB_ENV"

      # ── Upload to GitHub Release ──────────────────────────────────────────────
      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            ${{ runner.temp }}/Sift-${{ env.DMG_LABEL }}.dmg
