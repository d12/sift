name: Build & Sign

on:
  # Called from release-please.yml after a release is created
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

  # Run on every push to main (temporary — remove once CI is stable)
  push:
    branches:
      - main

  # Also allow manual runs for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: macos-15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Tooling ─────────────────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── Generate Xcode project ───────────────────────────────────────────────
      - name: Generate .xcodeproj
        run: xcodegen generate

      # ── Import code-signing certificate ─────────────────────────────────────
      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.CERTIFICATE_P12_PASSWORD }}

      # ── Build & Archive ──────────────────────────────────────────────────────
      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcodebuild \
            -project Sift.xcodeproj \
            -scheme Sift \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Sift.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            archive

      # ── Export signed .app ───────────────────────────────────────────────────
      - name: Create ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export archive
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Sift.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Notarize ─────────────────────────────────────────────────────────────
      - name: Notarize
        env:
          NOTARIZE_APPLE_ID:      ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_TEAM_ID:       ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_APP_PASSWORD:  ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/Sift.app" \
            "$RUNNER_TEMP/Sift.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Sift.zip" \
            --apple-id   "$NOTARIZE_APPLE_ID" \
            --team-id    "$NOTARIZE_TEAM_ID" \
            --password   "$NOTARIZE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/export/Sift.app"

      # ── Package as DMG ────────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          TAG="${{ inputs.tag }}"
          # Fall back to short SHA when triggered directly by a push
          LABEL="${TAG:-${{ github.sha }}}"
          LABEL="${LABEL:0:7}"
          hdiutil create \
            -volname "Sift" \
            -srcfolder "$RUNNER_TEMP/export/Sift.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/Sift-${LABEL}.dmg"
          echo "DMG_LABEL=${LABEL}" >> "$GITHUB_ENV"

      # ── Upload to GitHub Release ──────────────────────────────────────────────
      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            ${{ runner.temp }}/Sift-${{ env.DMG_LABEL }}.dmg
